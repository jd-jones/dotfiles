# remap prefix from 'C-b' to 'C-a'
set-option -g prefix C-a
bind-key C-a send-prefix

# Nested tmux passthrough — Ctrl+b toggles local key capture off/on.
# Use this when SSH'd into a remote machine running tmux with the same prefix.
# Status bar dims while passthrough is active as a visual indicator.
# Ctrl+b is the old tmux default, now repurposed as bypass.
bind -T root   C-b \
  set prefix None \; set key-table off \; set status-style "dim" \; refresh-client -S
bind -T off    C-b \
  set -u prefix    \; set -u key-table  \; set -u status-style    \; refresh-client -S

# Set vim-like navigations and paste
set -g status-keys vi
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

set -g mouse on

# Enable OSC 52 clipboard support — allows clipboard to propagate through SSH and nested tmux.
# When yanking in a remote tmux session, the OSC 52 sequence travels over SSH and is intercepted
# by the local tmux, which writes to the system clipboard (pbcopy on macOS).
set -g set-clipboard on

# set-option -g default-command "bash --rcfile /Users/jdjones/code/dotfiles/setup.sh"
# tmux-256color + RGB override enables true-color passthrough for Neovim themes
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
# Ensure the Ms (clipboard write) capability is defined for both terminal types
set -ag terminal-overrides ",tmux-256color:Ms=\\E]52;%p1%s;%p2%s\\007"
set -ag terminal-overrides ",xterm-256color:Ms=\\E]52;%p1%s;%p2%s\\007"

# Copy-mode: yank with 'y' or mouse drag writes to clipboard via OSC 52
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel

# Load theme from dotfiles `theme` file — change with: ./set-theme.sh <theme>
run-shell "~/code/dotfiles/load-tmux-theme.sh"
