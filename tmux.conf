# remap prefix from 'C-b' to 'C-a'
set-option -g prefix C-a
bind-key C-a send-prefix

# Nested tmux passthrough — Ctrl+b toggles local key capture off/on.
# Use this when SSH'd into a remote machine running tmux with the same prefix.
# Status bar dims while passthrough is active as a visual indicator.
# Ctrl+b is the old tmux default, now repurposed as bypass.
bind -T root   C-b \
  set prefix None \; set key-table off \; set status-style "dim" \; refresh-client -S
bind -T off    C-b \
  set -u prefix    \; set -u key-table  \; set -u status-style    \; refresh-client -S

# Set vim-like navigations and paste
set -g status-keys vi
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

set -g mouse on

# set-option -g default-command "bash --rcfile /Users/jdjones/code/dotfiles/setup.sh"
# tmux-256color + RGB override enables true-color passthrough for Neovim themes
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Load theme from dotfiles `theme` file — change with: ./set-theme.sh <theme>
run-shell "~/code/dotfiles/load-tmux-theme.sh"
