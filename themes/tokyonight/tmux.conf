# Tokyo Night — via tmux-ukiyo
# @ukiyo-theme is set dynamically by load-tmux-theme.sh based on the active variant.
# Plugin is cloned to ~/.config/tmux/plugins/Nybkox/tmux-ukiyo by install/macos.sh and install/debian.sh

set -g @ukiyo-show-powerline true
set -g @ukiyo-left-icon "session"
set -g @ukiyo-plugins "cpu-usage git battery time"

run ~/.config/tmux/plugins/Nybkox/tmux-ukiyo/ukiyo.tmux
